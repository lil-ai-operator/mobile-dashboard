<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚀 Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root { --green: #00ffc8; --green-dark: #00cc9f; --purple: #a855f7; --red: #ff6b6b; --yellow: #ffd93d; --blue: #38bdf8; --bg: #06060a; --card: #0f0f14; --hover: #1c1c26; --border: #2a2a35; }
    [data-theme="light"] { --bg: #f4f4f6; --card: #fff; --hover: #eee; --border: #e0e0e5; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: #fff; padding: 12px; margin: 0; min-height: 100vh; background-image: radial-gradient(ellipse at 0% 0%, rgba(168,85,247,0.12) 0%, transparent 50%), radial-gradient(ellipse at 100% 100%, rgba(0,255,200,0.08) 0%, transparent 50%); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes glow-pulse { 0%, 100% { filter: drop-shadow(0 0 6px rgba(0,255,200,0.5)); } 50% { filter: drop-shadow(0 0 15px rgba(0,255,200,0.7)); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-80px) rotate(720deg); opacity: 0; } }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    h1 { margin: 0; display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 800; }
    h1 img { animation: float 4s ease-in-out infinite, glow-pulse 2.5s ease-in-out infinite; border-radius: 10px; width: 38px; }
    h1 span { background: linear-gradient(135deg, #00ffc8, #a855f7, #38bdf8); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s infinite; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .updated { font-size: 10px; color: #555; }
    .btn { background: var(--card); border: 1px solid var(--border); color: #fff; width: 36px; height: 36px; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
    .btn:hover { transform: scale(1.1); border-color: var(--purple); }
    .refresh-btn { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #000; font-weight: 700; }
    .controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .search { flex: 1; min-width: 120px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; color: #fff; font-size: 13px; outline: none; font-family: inherit; }
    .search:focus { border-color: var(--green); }
    .filter { padding: 8px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; color: #777; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.3s; }
    .filter:hover { border-color: var(--purple); }
    .filter.active { background: linear-gradient(135deg, var(--green), var(--purple)); color: #000; border-color: transparent; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: var(--card); padding: 12px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
    .stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--green), var(--purple)); }
    .stat { position: relative; }
    .stat-num { font-size: 22px; font-weight: 800; }
    .stat-label { font-size: 10px; color: #666; margin-top: 2px; font-weight: 600; }
    .stat.green .stat-num { color: var(--green); }
    .stat.red .stat-num { color: var(--red); }
    .stat.yellow .stat-num { color: var(--yellow); }
    .stat.blue .stat-num { color: var(--blue); }
    .project { background: var(--card); padding: 14px; margin: 6px 0; border-radius: 14px; cursor: pointer; transition: all 0.3s; animation: slideIn 0.4s forwards; opacity: 0; border: 1px solid var(--border); }
    .project:nth-child(1) { animation-delay: 0.03s; } .project:nth-child(2) { animation-delay: 0.06s; } .project:nth-child(3) { animation-delay: 0.09s; } .project:nth-child(4) { animation-delay: 0.12s; } .project:nth-child(5) { animation-delay: 0.15s; } .project:nth-child(6) { animation-delay: 0.18s; } .project:nth-child(7) { animation-delay: 0.21s; }
    .project:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: var(--purple); }
    .green { border-left: 3px solid var(--green); }
    .red { border-left: 3px solid var(--red); }
    .yellow { border-left: 3px solid var(--yellow); }
    .p-header { display: flex; justify-content: space-between; align-items: center; }
    .p-name { font-size: 15px; font-weight: 700; }
    .p-status { padding: 4px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .p-status.green { background: var(--green); color: #000; }
    .p-status.red { background: var(--red); color: #fff; }
    .p-status.yellow { background: var(--yellow); color: #000; }
    .p-summary { color: #777; font-size: 12px; margin: 8px 0; line-height: 1.4; }
    .p-progress { height: 4px; background: var(--hover); border-radius: 2px; margin-top: 10px; }
    .p-progress-fill { height: 100%; border-radius: 2px; }
    .p-progress-fill.green { background: linear-gradient(90deg, var(--green), var(--green-dark)); }
    .p-progress-fill.red { background: linear-gradient(90deg, var(--red), #ff5252); }
    .p-progress-fill.yellow { background: linear-gradient(90deg, var(--yellow), #ffc107); }
    .p-meta { display: flex; justify-content: space-between; font-size: 11px; color: #555; margin-top: 6px; font-weight: 600; }
    .details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .details.open { display: block; animation: slideIn 0.3s; }
    .section { margin: 10px 0; }
    .section-header { font-weight: 700; padding: 10px 14px; background: var(--hover); border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .section-header:hover { background: var(--card); }
    .section-header.done { color: var(--green); }
    .section-header.todo { color: var(--yellow); }
    .section-header.files { color: var(--blue); }
    .task-list { display: none; padding: 8px 0; }
    .task-list.open { display: block; }
    .task { padding: 10px 14px; background: var(--hover); margin: 6px 0; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-size: 13px; transition: all 0.3s; cursor: pointer; }
    .task:hover { background: var(--card); transform: translateX(4px); }
    .task.checked { opacity: 0.5; text-decoration: line-through; }
    .task-check { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; font-weight: 800; }
    .task-check.done { background: var(--green); color: #000; }
    .task-check.todo { border: 2px solid #444; }
    .blocker { background: #1a0a0a; padding: 10px; border-radius: 10px; margin: 8px 0; border-left: 3px solid var(--red); font-size: 13px; }
    .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-top: 8px; }
    .file { background: var(--hover); padding: 10px 14px; border-radius: 10px; font-size: 12px; color: var(--blue); text-decoration: none; border: 1px solid var(--border); transition: all 0.3s; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .file:hover { border-color: var(--blue); background: var(--card); transform: translateY(-2px); }
    .arrow { transition: transform 0.3s; font-size: 10px; }
    .arrow.open { transform: rotate(180deg); }
    .confetti { position: fixed; top: 50%; left: 50%; font-size: 30px; animation: confetti 1s ease forwards; pointer-events: none; z-index: 9999; }
    .timeline { display: none; }
    @media (max-width: 500px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="header">
    <h1><img src="01_PEPE4-export.gif"> <span>Mission Control</span></h1>
    <div class="header-right">
      <span class="updated" id="updated"></span>
      <button class="btn" onclick="toggleTheme()">🌙</button>
      <button class="btn share-btn" onclick="shareStatus()">📤</button>
      <button class="btn refresh-btn" onclick="loadData()">↻</button>
    </div>
  </div>
  <div class="controls">
    <input type="text" class="search" id="search" placeholder="🔍 Search..." oninput="render()">
    <div class="filter active" onclick="setFilter('all',this)">All</div>
    <div class="filter" onclick="setFilter('green',this)">Active</div>
    <div class="filter" onclick="setFilter('yellow',this)">In Progress</div>
    <div class="filter" onclick="setFilter('red',this)">Blocked</div>
  </div>
  <div class="stats">
    <div class="stat green"><div class="stat-num" id="green">0</div><div class="stat-label">Active</div></div>
    <div class="stat yellow"><div class="stat-num" id="yellow">0</div><div class="stat-label">In Progress</div></div>
    <div class="stat red"><div class="stat-num" id="red">0</div><div class="stat-label">Blocked</div></div>
    <div class="stat blue"><div class="stat-num" id="tasks">0</div><div class="stat-label">Tasks</div></div>
  </div>
  <div id="projects"></div>
  <script>
    const projectFiles = {
      autobookr_suite: [
        {n:'💳 Landing',u:'https://lil-ai-operator.github.io/autobookr-landing/'},
        {n:'💰 Pricing',u:'https://lil-ai-operator.github.io/autobookr-landing/pricing.html'},
        {n:'❓ FAQ',u:'https://lil-ai-operator.github.io/autobookr-landing/faq.html'},
        {n:'📞 Sales Script',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/autobookr-sales-script.md'},
        {n:'🎨 Brand Kit',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/autobookr-brand-kit-v1.md'},
      ],
      mission_control: [
        {n:'📊 Dashboard',u:'https://lil-ai-operator.github.io/mobile-dashboard/'},
        {n:'📋 Data',u:'https://lil-ai-operator.github.io/mobile-dashboard/mission-control-data.json'},
      ],
      system_backup: [
        {n:'💾 Scripts',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/backup-scripts/'},
        {n:'📋 Runbook',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/backup-first-offsite-runbook.md'},
        {n:'🔄 Recovery',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/backup-recovery-plan.md'},
      ],
      neuronet: [{n:'🧠 Regions',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/brain-regions-plan.md'}],
      aavegotchi_bot: [{n:'🌊 Info',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/aavegotchi-wave1.md'}],
      etsy_business: [{n:'🛍️ Etsy',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/etsy-project-plan.md'}],
      clare_reiki: [
        {n:'✨ DivineFlow',u:'https://lil-ai-operator.github.io/divineflow/'},
        {n:'❓ FAQ',u:'https://lil-ai-operator.github.io/divineflow/faq.html'},
        {n:'📦 Products',u:'https://lil-ai-operator.github.io/divineflow/products.html'},
      ]
    };
    let allProjects = [], currentFilter = 'all', checkedTasks = JSON.parse(localStorage.getItem('checkedTasks') || '{}');
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    setInterval(loadData, 30000);
    document.addEventListener('keydown', e => { if(e.key === '/' && document.activeElement.tagName !== 'INPUT') { e.preventDefault(); document.getElementById('search').focus(); } if(e.key === 'r') loadData(); });
    function toggleTheme() { const curr = document.documentElement.getAttribute('data-theme'); const next = curr === 'light' ? 'dark' : 'light'; document.documentElement.setAttribute('data-theme', next); localStorage.setItem('theme', next); }
    function toggleProject(id) { document.getElementById('d-'+id).classList.toggle('open'); }
    function toggleSection(el) { el.nextElementSibling.classList.toggle('open'); el.querySelector('.arrow').classList.toggle('open'); }
    function toggleTask(pid, taskIdx) { const key = pid + '-' + taskIdx; checkedTasks[key] = !checkedTasks[key]; localStorage.setItem('checkedTasks', JSON.stringify(checkedTasks)); render(); if(checkedTasks[key]) checkCompletion(pid); }
    function checkCompletion(pid) { const p = allProjects.find(x => (x.key||'') === pid); if(p && p.done?.length) { const allDone = p.done.every((t, i) => checkedTasks[pid + '-' + i]); if(allDone && p.done.length > 0) showConfetti(); } }
    function showConfetti() { const emojis = ['🎉','⭐','🔥','💫','✨','🎊']; for(let i=0; i<8; i++) { const el = document.createElement('div'); el.className = 'confetti'; el.textContent = emojis[Math.floor(Math.random() * emojis.length)]; el.style.left = (30 + Math.random() * 40) + '%'; el.style.animationDelay = (i * 0.1) + 's'; document.body.appendChild(el); setTimeout(() => el.remove(), 1200); } }
    function setFilter(status, btn) { currentFilter = status; document.querySelectorAll('.filter').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }
    async function loadData() { try { const r = await fetch('mission-control-data.json?t='+Date.now()); const data = await r.json(); allProjects = data.projects || []; document.getElementById('updated').textContent = new Date(data.updatedAt).toLocaleTimeString(); render(); } catch(e) { document.getElementById('projects').innerHTML = '<div style="padding:20px;color:var(--red)">Error: '+e.message+'</div>'; } }
    function shareStatus() { const green = allProjects.filter(p => p.status === 'green').length; const red = allProjects.filter(p => p.status === 'red').length; const text = `🐸 Mission Control:\n\n✅ ${green} Active\n🔴 ${red} Blocked`; if(navigator.share) navigator.share({title: 'Mission Control', text}); else navigator.clipboard.writeText(text).then(() => alert('Copied!')); }
    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      let filtered = currentFilter === 'all' ? allProjects : allProjects.filter(p => p.status === currentFilter);
      if(search) filtered = filtered.filter(p => p.name.toLowerCase().includes(search) || (p.summary||'').toLowerCase().includes(search) || (p.done||[]).some(t => (typeof t==='string'?t:t.task||'').toLowerCase().includes(search)) || (p.todo||[]).some(t => (typeof t==='string'?t:t.task||'').toLowerCase().includes(search)));
      let green = yellow = red = tasks = 0;
      allProjects.forEach(p => { if(p.status === 'green') green++; if(p.status === 'yellow') yellow++; if(p.status === 'red') red++; tasks += (p.done?.length||0) + (p.todo?.length||0); });
      document.getElementById('green').textContent = green; document.getElementById('yellow').textContent = yellow; document.getElementById('red').textContent = red; document.getElementById('tasks').textContent = tasks;
      if(filtered.length === 0) { document.getElementById('projects').innerHTML = '<div style="padding:30px;text-align:center;color:#555">No projects found</div>'; return; }
      let html = '';
      filtered.forEach((p, i) => {
        const done = p.done?.length||0, todo = p.todo?.length||0, total = done+todo, pct = total ? Math.round(done/total*100) : 0;
        const files = projectFiles[p.key]||[];
        const pid = p.key || 'p'+i;
        html += '<div class="project '+p.status+'" onclick="toggleProject(\''+pid+'\')">';
        html += '<div class="p-header"><span class="p-name">'+p.name+'</span><span class="p-status '+p.status+'">'+p.status+'</span></div>';
        if(p.summary) html += '<div class="p-summary">'+p.summary+'</div>';
        html += '<div class="p-progress"><div class="p-progress-fill '+p.status+'" style="width:'+pct+'%"></div></div>';
        html += '<div class="p-meta"><span>'+done+'/'+total+'</span><span>'+pct+'%</span></div>';
        html += '<div id="d-'+pid+'" class="details">';
        if(p.blockers?.length) p.blockers.forEach(b => html += '<div class="blocker">🚫 '+b+'</div>');
        if(p.done?.length) { html += '<div class="section"><div class="section-header done" onclick="event.stopPropagation();toggleSection(this)"><span>✅ Done ('+p.done.length+')</span><span class="arrow">▼</span></div><div class="task-list">'; p.done.forEach((t, ti) => { const key = pid+'-'+ti; const checked = checkedTasks[key] ? 'checked' : ''; html += '<div class="task '+checked+'" onclick="event.stopPropagation();toggleTask(\''+pid+'\','+ti+')"><span class="task-check done">✓</span> '+(typeof t==='string'?t:t.task||'')+'</div>'; }); html += '</div></div>'; }
        if(p.todo?.length) { html += '<div class="section"><div class="section-header todo" onclick="event.stopPropagation();toggleSection(this)"><span>⬜ To Do ('+p.todo.length+')</span><span class="arrow">▼</span></div><div class="task-list">'; p.todo.forEach((t, ti) => { const key = pid+'-todo-'+ti; const checked = checkedTasks[key] ? 'checked' : ''; html += '<div class="task '+checked+'" onclick="event.stopPropagation();toggleTask(\''+pid+'\',\'todo\','+ti+')"><span class="task-check todo"></span> '+(typeof t==='string'?t:t.task||'')+'</div>'; }); html += '</div></div>'; }
        if(files.length) { html += '<div class="section"><div class="section-header files" onclick="event.stopPropagation();toggleSection(this)"><span>📁 Files ('+files.length+')</span><span class="arrow">▼</span></div><div class="task-list"><div class="files-grid">'; files.forEach(f => html += '<a class="file" href="'+f.u+'" target="_blank">'+f.n+'</a>'); html += '</div></div></div>'; }
        html += '</div></div>';
      });
      document.getElementById('projects').innerHTML = html;
    }
    loadData();
  </script>
</body>
</html>
