<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚀 Mission Control</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --bg-hover: #22222e;
      --accent-green: #00d68f;
      --accent-yellow: #ffaa00;
      --accent-red: #ff4757;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --text-primary: #ffffff;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-color: #2a2a3a;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1a24 0%, #0a0a0f 100%);
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-purple));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
    }
    
    .logo-text span {
      font-size: 12px;
      color: var(--text-muted);
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      width: 40px;
      height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    
    .icon-btn.active {
      background: var(--accent-green);
      color: #000;
      border-color: var(--accent-green);
    }
    
    /* Live indicator */
    .live-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .live-dot {
      width: 8px;
      height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Search */
    .search-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    
    .search-bar i { color: var(--text-muted); }
    
    .search-bar input {
      background: transparent;
      border: none;
      color: var(--text-primary);
      font-size: 14px;
      width: 100%;
      outline: none;
    }
    
    .search-bar input::placeholder { color: var(--text-muted); }
    
    /* Stats overview */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 16px 20px;
      background: var(--bg-secondary);
    }
    
    .stat-card {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      border: 1px solid var(--border-color);
    }
    
    .stat-card .number {
      font-size: 24px;
      font-weight: 700;
    }
    
    .stat-card .label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .stat-card.green .number { color: var(--accent-green); }
    .stat-card.yellow .number { color: var(--accent-yellow); }
    .stat-card.red .number { color: var(--accent-red); }
    .stat-card.blue .number { color: var(--accent-blue); }
    
    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      overflow-x: auto;
    }
    
    .filter-tab {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .filter-tab:hover { background: var(--bg-hover); }
    
    .filter-tab.active {
      background: var(--accent-blue);
      color: white;
      border-color: var(--accent-blue);
    }
    
    /* Project cards */
    .projects-container {
      padding: 0 20px;
    }
    
    .project-card {
      background: var(--bg-card);
      border-radius: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border-color);
      overflow: hidden;
      transition: all 0.3s;
    }
    
    .project-card:hover {
      border-color: var(--accent-purple);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    
    .project-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      cursor: pointer;
    }
    
    .project-info {
      flex: 1;
    }
    
    .project-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .priority-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    
    .priority-p0 { background: var(--accent-red); color: white; }
    .priority-p1 { background: var(--accent-yellow); color: black; }
    .priority-p2 { background: var(--text-muted); color: white; }
    
    .project-summary {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    
    .project-status {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    
    .status-green { 
      background: var(--accent-green); 
      box-shadow: 0 0 15px var(--accent-green);
    }
    .status-yellow { 
      background: var(--accent-yellow); 
      box-shadow: 0 0 15px var(--accent-yellow);
    }
    .status-red { 
      background: var(--accent-red); 
      box-shadow: 0 0 15px var(--accent-red);
    }
    
    /* Progress bar */
    .project-progress {
      padding: 0 16px 16px;
    }
    
    .progress-bar {
      height: 6px;
      background: var(--bg-secondary);
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    
    .progress-fill.green { background: var(--accent-green); }
    .progress-fill.yellow { background: var(--accent-yellow); }
    .progress-fill.red { background: var(--accent-red); }
    
    .progress-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    
    /* Expanded content */
    .project-content {
      display: none;
      border-top: 1px solid var(--border-color);
      padding: 16px;
      background: var(--bg-secondary);
    }
    
    .project-content.open { display: block; }
    
    .content-section {
      margin-bottom: 16px;
    }
    
    .content-section:last-child { margin-bottom: 0; }
    
    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-purple);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }
    
    .section-title i {
      transition: transform 0.2s;
    }
    
    .section-title.collapsed i {
      transform: rotate(-90deg);
    }
    
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .task-item {
      background: var(--bg-card);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    
    .task-item:hover {
      border-color: var(--border-color);
    }
    
    .task-item.done {
      color: var(--text-muted);
      text-decoration: line-through;
    }
    
    .task-status {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    
    .task-status.done { background: var(--accent-green); color: black; }
    .task-status.todo { border: 2px solid var(--text-muted); }
    .task-status.blocked { background: var(--accent-red); color: white; }
    
    /* Files section */
    .files-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    
    .file-link {
      background: var(--bg-card);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      color: var(--accent-blue);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
    }
    
    .file-link:hover {
      background: var(--bg-hover);
      border-color: var(--accent-blue);
    }
    
    /* Blockers */
    .blocker-item {
      background: rgba(255, 71, 87, 0.1);
      border-left: 3px solid var(--accent-red);
      padding: 10px 12px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .blocker-item i { color: var(--accent-red); }
    
    /* Activity feed */
    .activity-feed {
      max-height: 200px;
      overflow-y: auto;
    }
    
    .activity-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-color);
      font-size: 12px;
    }
    
    .activity-item:last-child { border: none; }
    
    .activity-icon {
      width: 28px;
      height: 28px;
      background: var(--bg-card);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .activity-icon.done { color: var(--accent-green); }
    .activity-icon.blocked { color: var(--accent-red); }
    .activity-icon.update { color: var(--accent-blue); }
    
    /* Floating action button */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent-green), var(--accent-purple));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
      box-shadow: 0 8px 30px rgba(0, 214, 143, 0.3);
      cursor: pointer;
      transition: all 0.3s;
      z-index: 90;
    }
    
    .fab:hover {
      transform: scale(1.1);
    }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal-overlay.open { display: flex; }
    
    .modal {
      background: var(--bg-card);
      border-radius: 20px;
      width: 100%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
      animation: modalIn 0.3s ease;
    }
    
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h2 { font-size: 18px; }
    
    .modal-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
    }
    
    .modal-body { padding: 20px; }
    
    /* Settings */
    .settings-group {
      margin-bottom: 20px;
    }
    
    .settings-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }
    
    .toggle {
      width: 48px;
      height: 26px;
      background: var(--bg-secondary);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .toggle.active { background: var(--accent-green); }
    
    .toggle::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }
    
    .toggle.active::after { transform: translateX(22px); }
    
    /* Mobile responsive */
    @media (max-width: 600px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .files-grid {
        grid-template-columns: 1fr;
      }
      
      .header {
        padding: 16px;
      }
      
      .logo-icon {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }
    }
  
    /* Light mode */
    body.light-mode {
      --bg-primary: #f5f5f7;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-hover: #f0f0f2;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --border-color: #d2d2d7;
    }
    
    /* Compact view */
    body.compact-view .project-card { padding: 0; }
    body.compact-view .project-header { padding: 12px; }
    body.compact-view .project-progress { padding: 0 12px 12px; }
    body.compact-view .project-content { padding: 12px; }
    body.compact-view .task-item, body.compact-view .file-link { padding: 8px; font-size: 12px; }
    body.compact-view .logo-icon { width: 36px; height: 36px; }
    body.compact-view .stats-row { padding: 12px; }
    body.compact-view .stat-card { padding: 10px; }
    body.compact-view .stat-card .number { font-size: 18px; }
    
    /* Scrollable files */
    .files-grid {
      max-height: 200px;
      overflow-y: auto;
      display: block;
    }
    .files-grid::-webkit-scrollbar { width: 6px; }
    .files-grid::-webkit-scrollbar-track { background: var(--bg-secondary); }
    .files-grid::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    /* Header - always dark */
    .header {
      background: #0a0a0f !important;
      border-bottom: 1px solid #2a2a3a !important;
    }
    
    .logo-text h1 { color: #ffffff !important; }
    .logo-text span { color: #6b7280 !important; }
    .live-status { color: #9ca3af !important; }
</style>
</head>

  </div>

business website.", "priority": "p2", "done": [], "todo": ["Define services", "Build site"], "blockers": ["Need info"]}]};

    // Charts
    let statusChart, tasksChart;
    
    function updateCharts(data, green, yellow, red) {
      const isDark = !document.body.classList.contains('light-mode');
      const textColor = isDark ? '#9ca3af' : '#4b5563';
      const gridColor = isDark ? '#2a2a3a' : '#e5e7eb';
      
      // Status donut chart
      const statusCtx = document.getElementById('statusChart').getContext('2d');
      if (statusChart) statusChart.destroy();
      statusChart = new Chart(statusCtx, {
        type: 'doughnut',
        data: {
          labels: ['Active', 'In Progress', 'Blocked'],
          datasets: [{
            data: [green, yellow, red],
            backgroundColor: ['#00d68f', '#ffaa00', '#ff4757'],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom', labels: { color: textColor, padding: 10, font: { size: 10 } } }
          }
        }
      });
      
      // Tasks bar chart
      const tasksCtx = document.getElementById('tasksChart').getContext('2d');
      const projectNames = data.projects.slice(0, 5).map(p => p.name.substring(0, 10));
      const projectDone = data.projects.slice(0, 5).map(p => p.done?.length || 0);
      const projectTodo = data.projects.slice(0, 5).map(p => p.todo?.length || 0);
      
      if (tasksChart) tasksChart.destroy();
      tasksChart = new Chart(tasksCtx, {
        type: 'bar',
        data: {
          labels: projectNames,
          datasets: [
            { label: 'Done', data: projectDone, backgroundColor: '#00d68f' },
            { label: 'Todo', data: projectTodo, backgroundColor: '#3b82f6' }
          ]
        },
        options: {
          responsive: true,
          scales: {
            x: { stacked: true, ticks: { color: textColor, font: { size: 9 } }, grid: { color: gridColor } },
            y: { stacked: true, ticks: { color: textColor, font: { size: 9 } }, grid: { color: gridColor } }
          },
          plugins: {
            legend: { position: 'bottom', labels: { color: textColor, padding: 5, font: { size: 9 } } }
          }
        }
      });
    }
    
    function render() {
      const data = window.missionData;
      document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date(data.updatedAt).toLocaleString();
      
      // Stats
      let green = 0, yellow = 0, red = 0, tasks = 0;
      data.projects.forEach(p => {
        if(p.status === 'green') green++;
        if(p.status === 'yellow') yellow++;
        if(p.status === 'red') red++;
        tasks += (p.done?.length || 0) + (p.todo?.length || 0);
      });
      
      document.getElementById('statGreen').textContent = green;
      document.getElementById('statYellow').textContent = yellow;
      document.getElementById('statRed').textContent = red;
      document.getElementById('statTasks').textContent = tasks;
      
      // Update Charts
      updateCharts(data, green, yellow, red);
      
      // Render projects
      const container = document.getElementById('projectsContainer');
      container.innerHTML = '';
      
      data.projects.forEach((p, i) => {
        if(currentFilter !== 'all' && p.status !== currentFilter) return;
        
        const doneCount = p.done?.length || 0;
        const todoCount = p.todo?.length || 0;
        const total = doneCount + todoCount;
        const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
        
        const files = projectFiles[p.key] || [];
        const hasFiles = files.length > 0;
        
        if(currentFilter === 'files' && !hasFiles) return;
        
        let html = `
          <div class="project-card" style="animation: fadeUp 0.4s ease-out ${i * 0.1}s both;">
            <div class="project-header" onclick="toggleProject('${p.key}')">
              <div class="project-info">
                <div class="project-name">
                  ${p.name}
                  <span class="priority-tag priority-${p.priority}">${p.priority.toUpperCase()}</span>
                </div>
                <div class="project-summary">${p.summary}</div>
              </div>
              <div class="project-status status-${p.status}"></div>
            </div>
            <div class="project-progress">
              <div class="progress-bar">
                <div class="progress-fill ${p.status}" style="width: ${pct}%"></div>
              </div>
              <div class="progress-stats">
                <span>${doneCount}/${total} tasks</span>
                <span>${pct}%</span>
              </div>
            </div>
            <div class="project-content" id="content-${p.key}">
        `;
        
        // Blockers
        if(p.blockers?.length) {
          html += `<div class="content-section">
            <div class="section-title">🚫 Blockers</div>
            ${p.blockers.map(b => `<div class="blocker-item"><i class="fas fa-exclamation-circle"></i> ${b}</div>`).join('')}
          </div>`;
        }
        
        // Done tasks
        if(p.done?.length) {
          html += `<div class="content-section">
            <div class="section-title" onclick="toggleSection(this)">✅ Done (${p.done.length}) <i class="fas fa-chevron-down"></i></div>
            <div class="task-list">
              ${p.done.map(t => `<div class="task-item done"><span class="task-status done">✓</span> ${typeof t === 'string' ? t : t.task}</div>`).join('')}
            </div>
          </div>`;
        }
        
        // Todo tasks
        if(p.todo?.length) {
          html += `<div class="content-section">
            <div class="section-title" onclick="toggleSection(this)">⬜ To Do (${p.todo.length}) <i class="fas fa-chevron-down"></i></div>
            <div class="task-list">
              ${p.todo.map(t => `<div class="task-item"><span class="task-status todo"></span> ${t}</div>`).join('')}
            </div>
          </div>`;
        }
        
        // Files
        if(hasFiles) {
          html += `<div class="content-section">
            <div class="section-title" onclick="toggleSection(this)">📁 Files (${files.length}) <i class="fas fa-chevron-down"></i></div>
            <div class="files-grid">
              ${files.map(f => `<a href="${f.url}" target="_blank" class="file-link"><i class="fas fa-file-alt"></i> ${f.name}</a>`).join('')}
            </div>
          </div>`;
        }
        
        html += `</div></div>`;
        container.innerHTML += html;
      });
    }
    
    function toggleProject(key) {
      const content = document.getElementById('content-' + key);
      content.classList.toggle('open');
    }
    
    function toggleSection(el) {
      el.classList.toggle('collapsed');
      const list = el.nextElementSibling;
      list.style.display = list.style.display === 'none' ? 'flex' : 'none';
    }
    
    function setFilter(filter, tab) {
      currentFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      render();
    }
    
    function filterProjects(query) {
      query = query.toLowerCase();
      document.querySelectorAll('.project-card').forEach(card => {
        const text = card.textContent.toLowerCase();
        card.style.display = text.includes(query) ? 'block' : 'none';
      });
    }
    
    function toggleSearch() {
      const bar = document.getElementById('searchBar');
      bar.style.display = bar.style.display === 'none' ? 'flex' : 'none';
      if(bar.style.display === 'flex') bar.querySelector('input').focus();
    }
    
    function openSettings() {
      document.getElementById('settingsModal').classList.add('open');
    }
    
    function closeSettings() {
      document.getElementById('settingsModal').classList.remove('open');
    }
    
    async function refreshData() {
      const fab = document.querySelector('.fab');
      const originalIcon = fab.innerHTML;
      fab.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      fab.style.animation = 'spin 1s linear infinite';
      
      try {
        const response = await fetch('https://lil-ai-operator.github.io/mobile-dashboard/mission-control-data.json');
        if (!response.ok) throw new Error('Failed to fetch');
        const jsonData = await response.json();
        
        // Update embedded data
        window.missionData = jsonData;
        localStorage.setItem('missionData', JSON.stringify(jsonData));
        
        render();
      } catch (err) {
        console.error('Refresh failed:', err);
        // Try loading from cache
        const cached = localStorage.getItem('missionData');
        if (cached) {
          window.missionData = JSON.parse(cached);
          render();
        }
      } finally {
        fab.innerHTML = originalIcon;
        fab.style.animation = '';
      }
    }
    
    // Close modal on outside click
    document.getElementById('settingsModal').addEventListener('click', function(e) {
      if(e.target === this) closeSettings();
    });
    
    // Initial load - try cache first, then fetch
    async function init() {
      const cached = localStorage.getItem('missionData');
      if (cached) {
        window.missionData = JSON.parse(cached);
        render();
      }
      // Then refresh in background
      await refreshData();
    }
    init();
    
    // Auto-refresh every 5 minutes
    setInterval(refreshData, 300000);
  </script>

    <script>

      const toggle = document.getElementById('darkModeToggle');
      toggle.classList.toggle('active');
      document.body.classList.toggle('light-mode');
      localStorage.setItem('darkMode', toggle.classList.contains('active'));
    }
    
    function toggleCompact() {
      const toggle = document.getElementById('compactToggle');
      toggle.classList.toggle('active');
      document.body.classList.toggle('compact-view');
      localStorage.setItem('compactView', toggle.classList.contains('active'));
    }
    
    function toggleAutoRefresh() {
      const toggle = document.getElementById('autoRefreshToggle');
      toggle.classList.toggle('active');
      if(toggle.classList.contains('active')) {
        window.autoRefreshInterval = setInterval(refreshData, 300000);
      } else {
        clearInterval(window.autoRefreshInterval);
      }
    }
    
    // Load preferences
    document.addEventListener('DOMContentLoaded', function() {
      if(localStorage.getItem('darkMode') === 'false') {
        document.getElementById('darkModeToggle').classList.remove('active');
        document.body.classList.add('light-mode');
      }
      if(localStorage.getItem('compactView') === 'true') {
        document.getElementById('compactToggle').classList.add('active');
        document.body.classList.add('compact-view');
      }
    });
    </script>
