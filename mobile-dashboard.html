<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Mission Control - Mobile</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0; padding: 16px; min-height: 100vh;
    }
    h1 { font-size: 20px; margin-bottom: 6px; color: #fff; }
    .timestamp { font-size: 12px; color: #94a3b8; margin-bottom: 14px; }
    .hint { font-size: 12px; color: #64748b; margin-bottom: 16px; }
    .quick-actions {
      background: #172033; border: 1px solid #334155; border-radius: 12px;
      padding: 12px; margin-bottom: 12px;
    }
    .quick-actions h2 { font-size: 13px; margin-bottom: 8px; color: #93c5fd; }
    .qa-item { font-size: 12px; color: #cbd5e1; padding: 6px 0; border-bottom: 1px solid #334155; }
    .qa-item:last-child { border-bottom: none; }
    .qa-tag { color: #94a3b8; margin-right: 6px; }
    .project-card {
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 14px; margin-bottom: 12px; cursor: pointer;
    }
    .project-header { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 8px; }
    .project-name { font-size: 15px; font-weight: 700; color: #fff; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .green { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
    .yellow { background: #eab308; box-shadow: 0 0 8px #eab308; }
    .red { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
    .summary { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }

    .track { display: flex; align-items: center; gap: 8px; }
    .track-bg { flex: 1; height: 7px; background: #334155; border-radius: 8px; overflow: hidden; }
    .track-fill { height: 100%; border-radius: 8px; }
    .pct { min-width: 40px; text-align: right; font-size: 12px; font-weight: 700; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8);
      z-index: 50; overflow-y: auto; padding: 18px;
    }
    .modal-overlay.active { display: block; }
    .modal {
      max-width: 450px; margin: 10px auto 30px; background: #1e293b;
      border: 1px solid #334155; border-radius: 14px; padding: 16px;
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .modal-title { font-size: 17px; font-weight: 700; color: #fff; }
    .close-btn { background: none; border: none; color: #cbd5e1; font-size: 24px; line-height: 1; }

    h3 { font-size: 12px; text-transform: uppercase; letter-spacing: .5px; margin: 14px 0 8px; color: #94a3b8; }
    .done-h { color: #6ee7b7; }
    .todo-h { color: #fcd34d; }
    .block-h { color: #fca5a5; }
    .item { font-size: 13px; border-bottom: 1px solid #334155; padding: 7px 0; display: flex; gap: 8px; }
    .item:last-child { border-bottom: none; }
    .badge { width: 18px; text-align: center; flex-shrink: 0; }

    .refresh-pill {
      position: fixed; right: 16px; bottom: 16px; border: 1px solid #3b82f6; background: #1d4ed8;
      color: #fff; border-radius: 999px; padding: 10px 14px; font-size: 12px; cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🚀 Mission Control</h1>
  <p class="timestamp" id="updated">Updated: loading…</p>
  <p class="hint">Auto-updates every 60s • Tap a project for full tasks</p>

  <div class="quick-actions" id="quickActions"></div>
  <div id="projectList"></div>

  <div class="modal-overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal" id="modal"></div>
  </div>

  <button class="refresh-pill" onclick="loadData(true)">↻ Refresh now</button>

  <script>
    let cached = null;

    function calcProgress(p) {
      const done = (p.done || []).length;
      const todo = (p.todo || []).length;
      const total = done + todo;
      if (!total) return 0;
      return Math.round((done / total) * 100);
    }

    function progressColor(pct) {
      if (pct > 75) return '#22c55e';
      if (pct >= 30) return '#eab308';
      return '#ef4444';
    }

    function itemRow(icon, text) {
      return `<div class="item"><span class="badge">${icon}</span><span>${text}</span></div>`;
    }

    function renderQuickActions(data) {
      const container = document.getElementById('quickActions');
      const actions = [];
      (data.projects || []).forEach(p => {
        if ((p.blockers || []).length) {
          actions.push({ project: p.name, task: p.blockers[0], kind: 'blocker' });
        } else if ((p.todo || []).length) {
          actions.push({ project: p.name, task: p.todo[0], kind: 'next' });
        }
      });

      const top = actions.slice(0, 3);
      container.innerHTML = '<h2>⚡ Top 3 Daily Moves</h2>' + (top.length
        ? top.map(a => `<div class="qa-item"><span class="qa-tag">${a.kind === 'blocker' ? '🚫' : '▶️'} ${a.project}:</span>${a.task}</div>`).join('')
        : '<div class="qa-item">No urgent actions right now.</div>');
    }

    function render(data) {
      cached = data;
      const updatedEl = document.getElementById('updated');
      const dt = data.updatedAt ? new Date(data.updatedAt) : new Date();
      updatedEl.textContent = `Updated: ${dt.toLocaleString()}`;

      renderQuickActions(data);

      const list = document.getElementById('projectList');
      list.innerHTML = '';

      (data.projects || []).forEach(p => {
        const pct = calcProgress(p);
        const color = progressColor(pct);

        const card = document.createElement('div');
        card.className = 'project-card';
        card.innerHTML = `
          <div class="project-header">
            <div class="project-name">${p.name}</div>
            <span class="status-dot ${p.status || 'yellow'}"></span>
          </div>
          <p class="summary">${p.summary || ''}</p>
          <div class="track">
            <div class="track-bg"><div class="track-fill" style="width:${pct}%; background:${color}"></div></div>
            <div class="pct" style="color:${color}">${pct}%</div>
          </div>
        `;
        card.onclick = () => openModal(p.key);
        list.appendChild(card);
      });
    }

    function openModal(key) {
      if (!cached) return;
      const p = (cached.projects || []).find(x => x.key === key);
      if (!p) return;

      const done = (p.done || []).map(t => itemRow('✅', t)).join('');
      const todo = (p.todo || []).map(t => itemRow('⬜', t)).join('');
      const blockers = (p.blockers || []).length
        ? (p.blockers || []).map(t => itemRow('🚫', t)).join('')
        : itemRow('✅', 'No active blockers');

      document.getElementById('modal').innerHTML = `
        <div class="modal-head">
          <div class="modal-title">${p.name}</div>
          <button class="close-btn" onclick="closeModal()">&times;</button>
        </div>
        <p class="summary">${p.summary || ''}</p>
        <h3 class="done-h">Done</h3>
        ${done || itemRow('•', 'None yet')}
        <h3 class="todo-h">To Do</h3>
        ${todo || itemRow('•', 'None')}
        <h3 class="block-h">Blockers</h3>
        ${blockers}
      `;

      document.getElementById('overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      document.getElementById('overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    async function loadData(manual) {
      try {
        const url = `mission-control-data.json?t=${Date.now()}`;
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to load dashboard data');
        const data = await res.json();
        render(data);
      } catch (err) {
        if (manual) alert('Could not refresh dashboard data right now.');
      }
    }

    loadData(false);
    setInterval(() => loadData(false), 60000);
  </script>
</body>
</html>
