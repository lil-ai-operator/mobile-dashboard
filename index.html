<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mission Control</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
    h1 { color: #00d68f; }
    .project { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .green { border-left: 4px solid #00d68f; }
    .red { border-left: 4px solid #ff4757; }
    .status { float: right; }
    .done { color: #00d68f; }
    .todo { color: #ffaa00; }
  </style>
</head>
<body>
  <h1>🐸 Mission Control</h1>
  <div id="projects">Loading...</div>
  <script>
    fetch('mission-control-data.json').then(r=>r.json()).then(data=>{
      let html = '';
      data.projects.forEach(p=>{
        html += '<div class="project '+p.status+'">';
        html += '<span class="status">'+p.status.toUpperCase()+'</span>';
        html += '<h3>'+p.name+'</h3>';
        html += '<p>'+(p.summary||'')+'</p>';
        if(p.done && p.done.length) html += '<p class="done">✓ '+p.done.length+' done</p>';
        if(p.todo && p.todo.length) html += '<p class="todo">○ '+p.todo.length+' to do</p>';
        html += '</div>';
      });
      document.getElementById('projects').innerHTML = html;
    }).catch(e=>{
      document.getElementById('projects').innerHTML = 'Error: '+e.message;
    });
  </script>
</body>
</html>
