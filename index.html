<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🚀 Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --green: #00d68f;
      --purple: #8b5cf6;
      --red: #ff4757;
      --yellow: #ffaa00;
      --bg: #0a0a0f;
      --card: #12121a;
      --hover: #1a1a24;
    }
    [data-theme="light"] {
      --bg: #f0f2f5;
      --card: #fff;
      --hover: #e8eaed;
    }
    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--bg); 
      color: #fff; 
      padding: 16px; 
      margin: 0; 
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at top, rgba(139,92,246,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(0,214,143,0.08) 0%, transparent 50%);
    }
    [data-theme="light"] body {
      background-image: none;
    }
    @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-6px) rotate(2deg); } 75% { transform: translateY(-3px) rotate(-1deg); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 15px rgba(0,214,143,0.4), 0 0 30px rgba(139,92,246,0.2); } 50% { box-shadow: 0 0 30px rgba(0,214,143,0.6), 0 0 60px rgba(139,92,purple,0.3); } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(30px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    h1 { margin: 0; display: flex; align-items: center; gap: 12px; font-size: 24px; font-weight: 700; }
    h1 img { animation: float 4s ease-in-out infinite, glow 3s ease-in-out infinite; border-radius: 12px; width: 44px; }
    h1 span { background: linear-gradient(90deg, #00d68f, #8b5cf6, #00d68f); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .updated { font-size: 11px; color: #666; }
    .theme-btn { background: var(--card); border: 1px solid #333; color: #fff; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 16px; }
    .refresh-btn { background: linear-gradient(135deg, #00d68f, #00b87a); border: none; color: #000; width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 14px; animation: glow 2s infinite; }
    .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search { flex: 1; min-width: 150px; padding: 12px 16px; background: var(--card); border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 14px; outline: none; }
    .search:focus { border-color: #00d68f; }
    [data-theme="light"] .search { border-color: #ddd; }
    .filter { padding: 10px 16px; background: var(--card); border: 1px solid #333; border-radius: 20px; color: #888; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .filter:hover { border-color: #00d68f; }
    .filter.active { background: #00d68f; color: #000; border-color: #00d68f; }
    .stats { display: flex; gap: 10px; margin-bottom: 16px; }
    .stat { flex: 1; background: var(--card); padding: 14px; border-radius: 12px; text-align: center; border: 1px solid #333; }
    .stat-num { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 11px; color: #666; margin-top: 4px; }
    .stat.green .stat-num { color: #00d68f; }
    .stat.red .stat-num { color: #ff4757; }
    .stat.yellow .stat-num { color: #ffaa00; }
    .stat.blue .stat-num { color: #3b82f6; }
    .project { background: var(--card); padding: 14px; margin: 8px 0; border-radius: 14px; cursor: pointer; transition: all 0.3s; animation: slideIn 0.5s forwards; opacity: 0; border: 1px solid transparent; position: relative; overflow: hidden; }
    .project::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); transition: left 0.5s; }
    .project:hover::before { left: 100%; }
    .project:nth-child(1) { animation-delay: 0.05s; } .project:nth-child(2) { animation-delay: 0.1s; } .project:nth-child(3) { animation-delay: 0.15s; } .project:nth-child(4) { animation-delay: 0.2s; } .project:nth-child(5) { animation-delay: 0.25s; } .project:nth-child(6) { animation-delay: 0.3s; } .project:nth-child(7) { animation-delay: 0.35s; }
    .project:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); border-color: rgba(139,92,246,0.3); }
    .green { border-left: 3px solid #00d68f; }
    .red { border-left: 3px solid #ff4757; }
    .yellow { border-left: 3px solid #ffaa00; }
    .p-header { display: flex; justify-content: space-between; align-items: center; }
    .p-name { font-size: 16px; font-weight: 600; }
    .p-status { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .p-status.green { background: #00d68f; color: #000; }
    .p-status.red { background: #ff4757; color: #fff; }
    .p-status.yellow { background: #ffaa00; color: #000; }
    .p-summary { color: #888; font-size: 13px; margin: 8px 0; line-height: 1.4; }
    .p-progress { height: 4px; background: #222; border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .p-progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .p-progress-fill.green { background: linear-gradient(90deg, #00d68f, #00b87a); }
    .p-progress-fill.red { background: linear-gradient(90deg, #ff4757, #ff3344); }
    .p-progress-fill.yellow { background: linear-gradient(90deg, #ffaa00, #ff9900); }
    .p-meta { display: flex; justify-content: space-between; font-size: 11px; color: #666; margin-top: 6px; }
    .details { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid #333; }
    .details.open { display: block; animation: slideIn 0.3s; }
    .section { margin: 10px 0; }
    .section-header { font-weight: 600; padding: 10px 14px; background: var(--hover); border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
    .section-header:hover { background: #252530; }
    .section-header.done { color: #00d68f; }
    .section-header.todo { color: #ffaa00; }
    .task-list { display: none; padding: 8px 0; }
    .task-list.open { display: block; }
    .task { padding: 8px 12px; background: var(--hover); margin: 6px 0; border-radius: 8px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .task:hover { background: #252530; transform: translateX(4px); }
    .task-check { width: 18px; height: 18px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
    .task-check.done { background: #00d68f; color: #000; }
    .task-check.todo { border: 2px solid #555; }
    .blocker { background: #2a1515; padding: 10px; border-radius: 8px; margin: 8px 0; border-left: 3px solid #ff4757; font-size: 13px; }
    .files { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .file { background: var(--hover); padding: 8px 12px; border-radius: 8px; font-size: 12px; color: #3b82f6; text-decoration: none; border: 1px solid #333; }
    .file:hover { border-color: #3b82f6; background: #1e1e28; }
    .arrow { transition: transform 0.3s; font-size: 10px; }
    .arrow.open { transform: rotate(180deg); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <h1><img src="01_PEPE4-export.gif"> <span>Mission Control</span></h1>
    </div>
    <div class="header-right">
      <span class="updated" id="updated"></span>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <button class="refresh-btn" onclick="loadData()" title="Refresh">↻</button>
    </div>
  </div>
  <div class="controls">
    <input type="text" class="search" id="search" placeholder="🔍 Search projects & tasks..." oninput="render()">
    <div class="filter active" onclick="setFilter('all',this)">All</div>
    <div class="filter" onclick="setFilter('green',this)">Active</div>
    <div class="filter" onclick="setFilter('yellow',this)">In Progress</div>
    <div class="filter" onclick="setFilter('red',this)">Blocked</div>
  </div>
  <div class="stats">
    <div class="stat green"><div class="stat-num" id="green">0</div><div class="stat-label">Active</div></div>
    <div class="stat yellow"><div class="stat-num" id="yellow">0</div><div class="stat-label">In Progress</div></div>
    <div class="stat red"><div class="stat-num" id="red">0</div><div class="stat-label">Blocked</div></div>
    <div class="stat blue"><div class="stat-num" id="tasks">0</div><div class="stat-label">Tasks</div></div>
  </div>
  <div id="projects"></div>
  <script>
    const projectFiles = {
      autobookr_suite: [{n:'Landing',u:'https://lil-ai-operator.github.io/autobookr-landing/'},{n:'Pricing',u:'https://lil-ai-operator.github.io/autobookr-landing/pricing.html'},{n:'FAQ',u:'https://lil-ai-operator.github.io/autobookr-landing/faq.html'}],
      mission_control: [{n:'Dashboard',u:'https://lil-ai-operator.github.io/mobile-dashboard/'}],
      system_backup: [{n:'Scripts',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/backup-scripts/'}],
      neuronet: [{n:'Regions',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/brain-regions-plan.md'}],
      aavegotchi_bot: [{n:'Wave 1',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/aavegotchi-wave1.md'}],
      etsy_business: [{n:'Plan',u:'https://lil-ai-operator.github.io/mobile-dashboard/generated/ops/etsy-project-plan.md'}],
      clare_reiki: [{n:'Website',u:'https://lil-ai-operator.github.io/divineflow/'}]
    };
    let allProjects = [], currentFilter = 'all';
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    
    // Auto-refresh every 30s
    setInterval(loadData, 30000);
    
    function toggleTheme() {
      const curr = document.documentElement.getAttribute('data-theme');
      const next = curr === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
    
    function toggleProject(id) {
      document.getElementById('d-'+id).classList.toggle('open');
    }
    
    function toggleSection(el) {
      el.nextElementSibling.classList.toggle('open');
      el.querySelector('.arrow').classList.toggle('open');
    }
    
    function setFilter(status, btn) {
      currentFilter = status;
      document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }
    
    async function loadData() {
      const btn = document.querySelector('.refresh-btn');
      btn.style.animation = 'spin 0.5s linear';
      try {
        const r = await fetch('mission-control-data.json?t='+Date.now());
        const data = await r.json();
        allProjects = data.projects || [];
        document.getElementById('updated').textContent = 'Updated ' + new Date(data.updatedAt).toLocaleTimeString();
        render();
      } catch(e) {
        document.getElementById('projects').innerHTML = '<div style="padding:20px;color:#ff4757">Error: '+e.message+'</div>';
      }
      setTimeout(() => btn.style.animation = '', 500);
    }
    
    function render() {
      const search = document.getElementById('search').value.toLowerCase();
      let filtered = currentFilter === 'all' ? allProjects : allProjects.filter(p => p.status === currentFilter);
      if(search) {
        filtered = filtered.filter(p => 
          p.name.toLowerCase().includes(search) || 
          (p.summary||'').toLowerCase().includes(search) ||
          (p.done||[]).some(t => (typeof t=== 'string'?t:t.task||'').toLowerCase().includes(search)) ||
          (p.todo||[]).some(t => (typeof t=== 'string'?t:t.task||'').toLowerCase().includes(search))
        );
      }
      let green = yellow = red = tasks = 0;
      allProjects.forEach(p => {
        if(p.status === 'green') green++;
        if(p.status === 'yellow') yellow++;
        if(p.status === 'red') red++;
        tasks += (p.done?.length||0) + (p.todo?.length||0);
      });
      document.getElementById('green').textContent = green;
      document.getElementById('yellow').textContent = yellow;
      document.getElementById('red').textContent = red;
      document.getElementById('tasks').textContent = tasks;
      
      if(filtered.length === 0) {
        document.getElementById('projects').innerHTML = '<div style="padding:40px;text-align:center;color:#666">No projects found</div>';
        return;
      }
      
      let html = '';
      filtered.forEach((p, i) => {
        const done = p.done?.length||0, todo = p.todo?.length||0, total = done+todo, pct = total ? Math.round(done/total*100) : 0;
        const files = projectFiles[p.key]||[];
        const pid = p.key || 'p'+i;
        html += '<div class="project '+p.status+'" onclick="toggleProject(\''+pid+'\')">';
        html += '<div class="p-header"><span class="p-name">'+p.name+'</span><span class="p-status '+p.status+'">'+p.status+'</span></div>';
        if(p.summary) html += '<div class="p-summary">'+p.summary+'</div>';
        html += '<div class="p-progress"><div class="p-progress-fill '+p.status+'" style="width:'+pct+'%;min-width:4px"></div></div>';
        html += '<div class="p-meta"><span>'+done+'/'+total+' tasks</span><span>'+pct+'%</span></div>';
        html += '<div id="d-'+pid+'" class="details">';
        if(p.blockers?.length) {
          p.blockers.forEach(b => html += '<div class="blocker">🚫 '+b+'</div>');
        }
        if(p.done?.length) {
          html += '<div class="section"><div class="section-header done" onclick="event.stopPropagation();toggleSection(this)"><span>✅ Done ('+p.done.length+')</span><span class="arrow">▼</span></div><div class="task-list">';
          p.done.forEach(t => html += '<div class="task"><span class="task-check done">✓</span> '+(typeof t==='string'?t:t.task||'')+'</div>');
          html += '</div></div>';
        }
        if(p.todo?.length) {
          html += '<div class="section"><div class="section-header todo" onclick="event.stopPropagation();toggleSection(this)"><span>⬜ To Do ('+p.todo.length+')</span><span class="arrow">▼</span></div><div class="task-list">';
          p.todo.forEach(t => html += '<div class="task"><span class="task-check todo"></span> '+(typeof t==='string'?t:t.task||'')+'</div>');
          html += '</div></div>';
        }
        if(files.length) {
          html += '<div class="files">';
          files.forEach(f => html += '<a class="file" href="'+f.u+'" target="_blank">📄 '+f.n+'</a>');
          html += '</div>';
        }
        html += '</div></div>';
      });
      document.getElementById('projects').innerHTML = html;
    }
    
    // Check URL for deep link
    const hash = window.location.hash.slice(1);
    if(hash) {
      setTimeout(() => {
        const el = document.getElementById('d-'+hash);
        if(el) el.classList.add('open');
      }, 500);
    }
    
    loadData();
  </script>
</body>
</html>
