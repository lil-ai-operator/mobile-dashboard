<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🐸 Mission Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#a855f7;--primary-light:#9333ea;--secondary:#00e5a0;--accent:#ff6b9d;--red:#ef4444;--yellow:#f59e0b;--blue:#38bdf8;--bg:#020204;--bg-card:#080810;--bg-hover:#0c0c14;--border:#1a1a24;--text:#9ca3af;--text-bright:#ffffff}
    [data-theme="light"]{--primary:#9333ea;--secondary:#10b981;--red:#dc2626;--yellow:#d97706;--blue:#0284c7;--bg:#f3f4f6;--bg-card:#ffffff;--bg-hover:#f3f4f6;--border:#e5e7eb;--text:#6b7280;--text-bright:#1f2937}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;-webkit-overflow-scrolling:touch;background:var(--bg);color:var(--text-bright);padding:12px;padding-bottom:100px;min-height:100vh;background:radial-gradient(ellipse at 0% 0%,rgba(168,85,247,0.1) 0%,transparent 50%),radial-gradient(ellipse at 100% 100%,rgba(0,229,160,0.05) 0%,transparent 50%),var(--bg)}
    .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
    .logo{display:flex;align-items:center;gap:8px;flex:1}
    .logo img{width:36px;height:36px;border-radius:10px;animation:float 3s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    .logo h1{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--secondary),var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    [data-theme="light"] .logo h1{color:var(--text-bright);background:none}
    .logo .time{font-size:10px;color:var(--text);margin-left:auto;padding-right:8px}
    .sync-status{font-size:9px;color:var(--secondary);margin-right:8px}
    .ctrl{display:flex;align-items:center;gap:4px}
    .btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-bright);cursor:pointer;font-size:13px;transition:0.2s}
    .btn:hover{transform:scale(1.1);border-color:var(--primary)}
    .btn-g{background:var(--primary);color:#fff;border:none}
    .sf{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .sch{flex:1;min-width:100px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;color:var(--text-bright);font-size:13px;font-family:inherit}
    .sch:focus{outline:none;border-color:var(--primary)}
    [data-theme="light"] .sch{background:#fff}
    .fil{padding:8px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:20px;color:var(--text);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:0.2s}
    .fil:hover{border-color:var(--primary)}
    .fil.on{background:var(--primary);color:#fff;border-color:var(--primary)}
    .st{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
    .stat{background:var(--bg-card);border-radius:12px;padding:12px 8px;text-align:center;border:2px solid var(--border)}
    .stat.g{border-color:var(--secondary);box-shadow:0 0 15px rgba(0,229,160,0.3)}
    .stat.on{border-width:3px;padding:11px 7px}
    [data-theme="light"] .stat{box-shadow:none}
    .stat.r{border-color:var(--red);box-shadow:0 0 15px rgba(239,68,68,0.3)}
    .stat.r.on{border-color:var(--red);box-shadow:0 0 15px rgba(239,68,68,0.4);transform:scale(1.02)}.stat.y{border-color:var(--yellow);box-shadow:0 0 15px rgba(245,158,11,0.3)}
    .stat.y.on{border-color:var(--yellow);box-shadow:0 0 15px rgba(245,158,11,0.4);transform:scale(1.02)}.stat.blu{border-color:var(--blue);box-shadow:0 0 15px rgba(56,189,248,0.3)}
    .stat.blu.on{border-color:var(--blue);box-shadow:0 0 15px rgba(56,189,248,0.4);transform:scale(1.02)}
    .stat-n{font-size:20px;font-weight:800}.stat-l{font-size:9px;color:var(--text);margin-top:2px;font-weight:600;text-transform:uppercase}
    .g .stat-n{color:var(--secondary)}.r .stat-n{color:var(--red)}.y .stat-n{color:var(--yellow)}.b .stat-n{color:var(--blue)}
    .prog{margin-bottom:12px;background:var(--bg-card);border-radius:12px;padding:12px 16px;border:1px solid var(--border)}
    .prog-h{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px}
    .prog-l{color:var(--text)}.prog-r{color:var(--secondary);font-weight:700}
    .prog-bar{height:8px;background:var(--bg-hover);border-radius:4px;overflow:hidden}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--secondary),var(--primary));border-radius:4px;transition:width 0.5s}
    .streak{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--yellow)}
    .streak span{font-weight:700}
    .projs{display:flex;flex-direction:column;gap:10px}
    .proj{animation:slideIn 0.4s forwards;opacity:0;position:relative;transition:all 0.3s;border:2px solid var(--border);border-radius:14px;overflow:hidden}
    .proj.green{border-color:var(--secondary);box-shadow:0 0 15px rgba(0,229,160,0.25)}
    .proj.red{border-color:var(--red);box-shadow:0 0 15px rgba(239,68,68,0.25)}
    .proj.yellow{border-color:var(--yellow);box-shadow:0 0 15px rgba(245,158,11,0.25)}
    .proj:hover{transform:translateY(-2px)}
    @keyframes slideIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
    .proj:nth-child(1){animation-delay:0.05s}.proj:nth-child(2){animation-delay:0.1s}.proj:nth-child(3){animation-delay:0.15s}.proj:nth-child(4){animation-delay:0.2s}.proj:nth-child(5){animation-delay:0.25s}.proj:nth-child(6){animation-delay:0.3s}.proj:nth-child(7){animation-delay:0.35s}
    .proj-inner{background:var(--bg-card);padding:14px}
    .proj-inner.on{border-radius:0}
    .proj.on{border-radius:14px}

    .p-h{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .p-l{display:flex;align-items:center;gap:10px}
    .p-i{width:10px;height:10px;border-radius:50%}
    :root .green .p-i{background:var(--secondary)}:root .red .p-i{background:var(--red)}:root .yellow .p-i{background:var(--yellow)}
    .p-n{font-size:15px;font-weight:700}
    .p-b{padding:5px 12px;border-radius:15px;font-size:10px;font-weight:700;text-transform:uppercase}
    :root .green .p-b{background:var(--secondary);color:#000}:root .red .p-b{background:var(--red);color:#fff}:root .yellow .p-b{background:var(--yellow);color:#000}
    .p-bar{height:4px;background:var(--bg-hover);margin:10px 0 8px;border-radius:2px}
    .p-f{height:100%;border-radius:2px}
    :root .green .p-f{background:var(--secondary)}:root .red .p-f{background:var(--red)}:root .yellow .p-f{background:var(--yellow)}
    .p-m{display:flex;justify-content:space-between;font-size:11px;color:var(--text);font-weight:600}
    .p-bd{display:none;padding-top:12px}
    .p-bd.on{display:block;animation:slideIn 0.3s;background:var(--bg-card);padding:16px;width:100%;box-sizing:border-box}
    .p-bd .sec{margin-top:12px}
    .green .p-bd.on{background:var(--bg-card)}
    .red .p-bd.on{background:var(--bg-card)}
    .yellow .p-bd.on{background:var(--bg-card)}
    .blue .p-bd.on{background:var(--bg-card)}
    .sec{margin-bottom:16px}
    .s-h{font-size:13px;font-weight:700;padding:10px 12px;background:var(--bg-card);border-radius:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .s-h.y{color:var(--yellow)}.s-h.b{color:var(--blue)}
    .s-l{display:none;padding-left:8px;margin-top:8px}.s-l.on{display:block}
    .t{padding:10px 12px;background:var(--bg-card);border-radius:8px;margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:0.2s}
    .t.o{opacity:0.5;text-decoration:line-through}
    .t-c{width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
    :root .t-c.d{background:var(--secondary);color:#000}
    .t-c.o{border:2px solid #555}
    .t.o .t-c.o{background:var(--secondary)}
    .t-tex{flex:1;word-break:break-word}
    .send-btn{background:var(--primary);border:none;border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;margin-left:8px}
    .blk{background:var(--bg-hover);padding:12px;border-radius:8px;font-size:13px;margin-bottom:8px;font-weight:600}
    [data-theme="light"] .blk{background:#fef2f2}
    .fils{display:grid;grid-template-columns:repeat(auto-fill,min-width:100px);gap:6px;margin-top:8px}
    .file{background:var(--bg-hover);padding:10px 14px;border-radius:10px;font-size:11px;color:var(--blue);text-decoration:none;transition:0.2s;font-weight:600;text-align:center}
    .file:hover{transform:translateY(-2px)}
    [data-theme="light"] .file{background:#fff}
    .arr{transition:transform 0.2s;font-size:10px}.arr.on{transform:rotate(180deg)}
    .conf{position:fixed;top:40%;left:50%;font-size:35px;animation:cf 0.8s forwards;pointer-events:none}
    @keyframes cf{0%{transform:translate(-50%,0) scale(0) rotate(0);opacity:1}50%{transform:translate(-50%,-30%) scale(1.2) rotate(180deg)}100%{transform:translate(-50%,-80px) scale(0.5) rotate(360deg);opacity:0}}
    .fab{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:100}
    .fab-btn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(168,85,247,0.4);transition:all 0.3s;display:flex;align-items:center;justify-content:center}
    .fab-btn:hover{transform:scale(1.1)}
    .fab-sub{display:none;flex-direction:column;gap:8px;position:absolute;bottom:70px;right:0}
    .fab-sub.show{display:flex;animation:fadeIn 0.2s}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .fab-sub .fab-btn{width:48px;height:48px;font-size:18px}
    .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
    .modal.show{display:flex}
    .modal-content{background:var(--bg-card);border:2px solid var(--primary);border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto}
    .modal h2{font-size:18px;margin-bottom:16px;color:var(--primary)}
    .modal input,.modal textarea,.modal select{width:100%;padding:12px;margin-bottom:12px;background:var(--bg-hover);border:1px solid var(--border);border-radius:10px;color:var(--text-bright);font-size:14px;font-family:inherit}
    .modal textarea{height:100px;resize:none}
    .modal-btns{display:flex;gap:10px}
    .modal-btns button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer}
    .modal-cancel{background:var(--bg-hover);color:var(--text-bright)}
    .modal-save{background:var(--primary);color:#fff}
    .sound-toggle{position:fixed;bottom:20px;left:20px;width:40px;height:40px;border-radius:50%;background:var(--bg-card);border:2px solid var(--border);color:var(--text);font-size:16px;cursor:pointer;z-index:100}
    .sound-toggle.on{border-color:var(--secondary);color:var(--secondary)}
    .notif-tab{position:fixed;top:50%;right:0;transform:translateY(-50%);background:var(--bg-card);border:2px solid var(--border);border-right:none;border-radius:12px 0 0 12px;padding:12px 8px;cursor:pointer;z-index:99;writing-mode:vertical-rl;text-orientation:mixed;font-size:12px;font-weight:700;color:var(--text);box-shadow:-4px 0 15px rgba(0,0,0,0.3)}
    .notif-tab:hover{transform:translateY(-50%);border-color:var(--primary)}
    .notif-tab.has-new{border-color:var(--primary);box-shadow:0 0 20px var(--primary);color:var(--primary);animation:notifPulse 2s infinite}
    @keyframes notifPulse{0%,100%{box-shadow:0 0 20px var(--primary)}50%{box-shadow:0 0 35px var(--primary)}}
    .notif-panel{position:fixed;top:10%;right:-300px;width:300px;height:80vh;background:var(--bg-card);border:2px solid var(--primary);border-right:none;border-radius:16px 0 0 16px;z-index:100;transition:right 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);box-shadow:-10px 0 30px rgba(0,0,0,0.5);overflow-y:auto}
    .notif-panel.open{right:0}
    .notif-header{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--border)}
    .notif-header h2{font-size:16px;color:var(--primary)}
    .notif-close{background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}
    .notif-item{padding:14px;border-bottom:1px solid var(--border);font-size:13px}
    .notif-item .time{font-size:10px;color:var(--text);margin-top:6px}
  
    .stats-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.3s}
    .stats-panel.show{display:flex}
    @keyframes fadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    .stats-content{background:var(--bg-card);border-radius:20px;padding:24px;width:100%;max-width:320px;max-height:80vh;overflow-y:auto;animation:slideUp 0.3s}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
    .stats-close{position:absolute;top:20px;right:20px;background:none;border:none;color:#fff;font-size:32px;cursor:pointer}
    .stat-detail{text-align:center;padding:20px}
    .stat-detail-n{font-size:48px;font-weight:800;margin:10px 0}
    .stat-detail-l{font-size:14px;color:var(--text)}
    .stat-list{text-align:left;margin-top:16px;max-height:200px;overflow-y:auto}
    .stat-list-item{display:flex;justify-content:space-between;padding:10px;background:var(--bg-hover);border-radius:8px;margin-bottom:6px;font-size:13px}
  </style>
</head>
<body>
  <div class="hdr">
    <div class="logo">
      <img src="01_PEPE4-export.gif">
      <h1>Mission Control</h1>
      <span class="sync-status" id="syncStatus">● Synced</span>
    </div>
    <div class="ctrl">
      <button class="btn" onclick="theme()">🌙</button>
      <button class="btn" onclick="share()">📤</button>
      <button class="btn btn-g" onclick="load()">↻</button>
    </div>
  </div>
  <div class="sf">
    <input class="sch" id="s" placeholder="🔍 Search..." oninput="render()">
    <div class="fil on" onclick="setF('all',this)">All</div>
    <div class="fil" onclick="setF('green',this)">Active</div>
    <div class="fil" onclick="setF('red',this)">Blocked</div>
  </div>
  <div class="st">
    <div class="stat g" onclick="this.classList.toggle('on');openStats('active','green')"><div class="stat-n" id="g">0</div><div class="stat-l">ACTIVE</div></div>
    <div class="stat y" onclick="this.classList.toggle('on');openStats('progress','yellow')"><div class="stat-n" id="y">0</div><div class="stat-l">IN PROGRESS</div></div>
    <div class="stat r" onclick="this.classList.toggle('on');openStats('blocked','red')"><div class="stat-n" id="r">0</div><div class="stat-l">BLOCKED</div></div>
    <div class="stat blu" onclick="this.classList.toggle('on');openStats('tasks','blue')"><div class="stat-n" id="t">0</div><div class="stat-l">TASKS</div></div>
  </div>
  <div class="prog">
    <div class="prog-h"><span class="prog-l">Weekly Progress</span><span class="prog-r" id="progPct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="streak">🔥 <span id="streak">0</span> day streak</div>
  </div>
  <div class="projs" id="p"></div>
  <div class="fab">
    <div class="fab-sub" id="fabSub">
      <button class="fab-btn" onclick="openModal('idea')" title="💡 Add Idea">💡</button>
      <button class="fab-btn" onclick="openModal('note')" title="📝 Quick Note">📝</button>
      <button class="fab-btn" onclick="openModal('task')" title="✅ Add Task">✅</button>
    </div>
    <button class="fab-btn" onclick="toggleFab()">+</button>
  </div>
  <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔇</button>
  <div class="notif-tab has-new" id="notifTab" onclick="toggleNotifs()">🔔 Notifications</div>
  <div class="notif-panel" id="notifPanel">
    <div class="notif-header">
      <h2>🔔 Notifications</h2>
      <button class="notif-close" onclick="toggleNotifs()">✕</button>
    </div>
    <div style="padding:10px;font-size:11px;color:var(--text);text-align:center">← Swipe right to close</div>
    <div id="notifList"></div>
  </div>
  <div class="modal" id="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add Task</h2>
      <select id="modalProject"><option value="">Select Project...</option></select>
      <input id="modalInput" placeholder="Task name...">
      <textarea id="modalText" placeholder="Details (optional)..."></textarea>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="modal-save" onclick="saveModal()">Save</button>
      </div>
    </div>
  </div>
  <script>
    // Distinct Zen Sound Palette
    let soundOn = false;
    let audioCtx = null;
    
    function initAudio() {
      try {
        if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
      } catch(e) {}
    }
    
    function playSound(type) {
      try {
        if (!soundOn || !audioCtx) return;
        const now = audioCtx.currentTime;
        switch(type) {
          case 'tap': t(880, 0.04, 0, 0.04); break;
          case 'open': t(440, 0.06, 0); setTimeout(() => t(554, 0.06, 0.03), 30); setTimeout(() => t(659, 0.1, 0.06), 60); break;
          case 'close': t(554, 0.05, 0); setTimeout(() => t(440, 0.08, 0.03), 30); break;
          case 'fab': t(392, 0.06, 0); setTimeout(() => t(523, 0.06, 0.04), 40); setTimeout(() => t(659, 0.1, 0.08), 80); break;
          case 'modal': t(349, 0.08, 0); setTimeout(() => t(440, 0.1, 0.05), 50); break;
          case 'send': t(523, 0.06, 0); setTimeout(() => t(659, 0.06, 0.05), 50); setTimeout(() => t(784, 0.15, 0.1), 100); break;
          case 'done': t(880, 0.04, 0, 0.04); break;
          case 'complete': t(523, 0.1, 0); setTimeout(() => t(659, 0.1, 0.05), 50); setTimeout(() => t(784, 0.1, 0.1), 100); setTimeout(() => t(1047, 0.2, 0.15), 150); break;
          case 'swipe': t(294, 0.06, 0); setTimeout(() => t(220, 0.08, 0.03), 30); break;
          case 'toggle': t(698, 0.04, 0, 0.03); break;
          case 'filter': t(587, 0.05, 0, 0.04); break;
          default: t(440, 0.05, 0, 0.04);
        }
      } catch(e) {}
    }
    
    function t(freq, dur, dely, vol) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine'; osc.connect(gain); gain.connect(audioCtx.destination);
      const now = audioCtx.currentTime + (dely || 0);
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(vol || 0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.start(now); osc.stop(now + dur);
    }
    
    function toggleSound() {
      soundOn = !soundOn;
      document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
      document.getElementById('soundToggle').classList.toggle('on', soundOn);
      localStorage.setItem('mc_sound', soundOn);
      if(soundOn) initAudio();
    }
    if(localStorage.getItem('mc_sound') === 'true') toggleSound();

    let data=[],f='all',checked=JSON.parse(localStorage.getItem('mc_chk')||'{}'),modalType='',openProjects=JSON.parse(localStorage.getItem('mc_open')||'[]'),openSections=JSON.parse(localStorage.getItem('mc_sections')||'[]');

    function restoreState(){openProjects.forEach(id=>{const bd=document.getElementById('b-'+id);if(bd){bd.classList.add('on');bd.parentElement.classList.add('on');bd.previousElementSibling.classList.add('on')}});openSections.forEach(sec=>{const[pid,type]=sec.split('-');const bd=document.getElementById('b-'+pid);if(bd){const header=bd.querySelector('[data-sec="'+type+'"]');if(header){header.nextElementSibling.classList.add('on');header.querySelector('.arr').classList.add('on')}}})}

    function toggle(id){const bd=document.getElementById('b-'+id),proj=bd?.parentElement,inner=proj?.querySelector('.proj-inner');document.querySelectorAll('.p-bd').forEach(el=>{if(el.id!=='b-'+id)el.classList.remove('on')});document.querySelectorAll('.proj').forEach(el=>el.classList.remove('on'));bd.classList.toggle('on');if(bd.classList.contains('on')){inner?.classList.add('on');proj?.classList.add('on');if(!openProjects.includes(id)){openProjects.push(id)}}else{openProjects=openProjects.filter(p=>p!==id);inner?.classList.remove('on');proj?.classList.remove('on')}localStorage.setItem('mc_open',JSON.stringify(openProjects));playSound('tap')}

    function chk(pid,i){const k=pid+'-'+i;checked[k]=!checked[k];localStorage.setItem('mc_chk',JSON.stringify(checked));render();if(checked[k]){const p=data.find(x=>(x.key||'')===pid);if(p&&p.done?.every((t,j)=>checked[pid+'-'+j])){showC();playSound('complete')}};playSound('tap')}

    function saveModal(){const proj=document.getElementById('modalProject').value,inp=document.getElementById('modalInput').value,txt=document.getElementById('modalText').value;if(!inp){alert('Please enter something!');return}const msg=modalType==='idea'?'💡 NEW IDEA\n\n'+inp+'\n\n'+txt:modalType==='note'?'📝 QUICK NOTE\n\n'+inp+'\n\n'+txt:'✅ TASK: '+proj+'\n\n'+inp+'\n\n'+txt;const encoded=encodeURIComponent(msg);window.open('https://t.me/lilPepeG_bot?text='+encoded,'_blank');closeModal();playSound('send');showC()}
    let touchStartX=0,touchStartY=0,isSwiping=false,panel=null,swipeAttached=false;
    function onTouchStart(e){touchStartX=e.touches[0].pageX;touchStartY=e.touches[0].pageY;panel=document.getElementById('notifPanel');isSwiping=false}
    function onTouchMove(e){if(!panel||!panel.classList.contains('open'))return;const cx=e.touches[0].pageX,cy=e.touches[0].pageY,dx=Math.abs(cx-touchStartX),dy=Math.abs(cy-touchStartY);if(dx>dy+20&&dx>30){isSwiping=true;e.preventDefault();const mx=cx-touchStartX;if(mx>0){panel.style.transition='none';panel.style.right=(-mx)+'px'}}}
    function onTouchEnd(e){if(!panel)return;if(isSwiping){panel.style.transition='';const tx=e.changedTouches[0].pageX,dx=tx-touchStartX;dx>80?(panel.style.right='-300px',panel.classList.remove('open'),detachSwipe(),playSound('swipe')):panel.style.right='0px'}touchStartX=0;touchStartY=0;isSwiping=false;panel=null}
    function attachSwipe(){if(!swipeAttached){document.addEventListener('touchstart',onTouchStart,{passive:true});document.addEventListener('touchmove',onTouchMove,{passive:false});document.addEventListener('touchend',onTouchEnd,{passive:true});swipeAttached=true}}
    function detachSwipe(){if(swipeAttached){document.removeEventListener('touchstart',onTouchStart);document.removeEventListener('touchmove',onTouchMove);document.removeEventListener('touchend',onTouchEnd);swipeAttached=false}}
    function toggleNotifs(){const p=document.getElementById('notifPanel'),t=document.getElementById('notifTab'),o=p.classList.contains('open');if(o){p.classList.remove('open');p.style.right='-300px';detachSwipe();playSound('swipe')}else{p.classList.add('open');p.style.right='0px';attachSwipe();t.classList.remove('has-new');playSound('modal')}}
    const notifs=[{t:'Mission Control updated',d:'Just now'},{t:'AutoBookr landing ready',d:'5 min ago'},{t:'Backup scripts ready',d:'1 hour ago'},{t:'NeuroNet needs approval',d:'2 hours ago'}];

    function render(){
      const q=document.getElementById('s').value.toLowerCase();
      let pf=f==='all'?data:data.filter(p=>p.status===f);
      if(q)pf=pf.filter(p=>p.name.toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q));
      let g=y=r=tt=0,completed=0,total=0;
      data.forEach(p=>{const d=p.done?.length||0,tdi=p.todo?.length||0;if(p.status==='green')g++;if(p.status==='yellow')y++;if(p.status==='red')r++;completed+=d;total+=d+tdi;tt+=tdi});
      const pct=total?Math.round(completed/total*100):0;
      document.getElementById('g').textContent=g;document.getElementById('y').textContent=y;document.getElementById('r').textContent=r;document.getElementById('t').textContent=tt;
      document.getElementById('progPct').textContent=pct+'%';document.getElementById('progFill').style.width=pct+'%';
      let streak=parseInt(localStorage.getItem('mc_streak')||'0');
      document.getElementById('streak').textContent=streak;
      if(!pf.length){document.getElementById('p').innerHTML='<div style="padding:40px;text-align:center;color:var(--text);font-size:14px">No projects</div>';return}
      let h='';pf.forEach((p,i)=>{const d=p.done?.length||0,td=p.todo?.length||0,tot=d+td,pc=tot?Math.round(d/tot*100):0;const fs=files[p.key]||[];const id=p.key||'p'+i;

        if(p.blockers?.length)p.blockers.forEach(b=>h+=`<div class="blk">🚫 ${b}</div>`);
        if(p.done?.length){const doneOpen=openSections.includes(id+'-done')?' on':'';h+=`<div class="sec"><div class="s-h" data-sec="done" onclick="event.stopPropagation();toggS(this);playSound('tap')">✅ Done (${p.done.length}) <span class="arr${doneOpen?' on':''}">▼</span></div><div class="s-l${doneOpen}">`;p.done.forEach((t,j)=>{const k=id+'-'+j,ck=checked[k]?' o':'';h+=`<div class="t${ck}" onclick="event.stopPropagation();chk('${id}',${j})"><span class="t-c d">✓</span> <span class="t-tex">${typeof t==='string'?t:t.task||''}</span></div>`});h+='</div></div>'}

    // Stats Panel - unique for each box
    function openStats(type, color){
      const panel = document.getElementById('statsPanel');
      const content = document.getElementById('statsContent');
      const colors = { green: 'var(--secondary)', yellow: 'var(--yellow)', red: 'var(--red)', blue: 'var(--blue)' };
      content.style.border = '2px solid ' + (colors[color] || 'var(--primary)');
      panel.classList.add('show');
      playSound('modal');
      
      let html = '';
      if(type === 'active') {
        const active = data.filter(p => p.status === 'green');
        html = '<div class="stat-detail"><div style="font-size:40px">✅</div><div class="stat-detail-n" style="color:var(--secondary)">'+active.length+'</div><div class="stat-detail-l">Active Projects</div></div>';
        if(active.length) {
          html += '<div class="stat-list">';
          active.forEach(p => html += '<div class="stat-list-item"><span>'+p.name+'</span><span style="color:var(--secondary)">'+p.done?.length+'/'+((p.done?.length||0)+(p.todo?.length||0))+'</span></div>');
          html += '</div>';
        }
      } else if(type === 'progress') {
        const total = data.reduce((a,p) => a + (p.done?.length||0) + (p.todo?.length||0), 0);
        const done = data.reduce((a,p) => a + (p.done?.length||0), 0);
        const pct = total ? Math.round(done/total*100) : 0;
        html = '<div class="stat-detail"><div style="font-size:40px">⏳</div><div class="stat-detail-n" style="color:var(--yellow)">'+pct+'%</div><div class="stat-detail-l">Overall Progress</div></div>';
        html += '<div class="stat-bar" style="height:10px;margin-top:16px"><div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,var(--yellow),var(--secondary));border-radius:5px"></div></div>';
        html += '<div style="text-align:center;margin-top:8px;color:var(--text);font-size:12px">'+done+' of '+total+' tasks complete</div>';
      } else if(type === 'blocked') {
        const blocked = data.filter(p => p.status === 'red');
        html = '<div class="stat-detail"><div style="font-size:40px">🚫</div><div class="stat-detail-n" style="color:var(--red)">'+blocked.length+'</div><div class="stat-detail-l">Blocked Projects</div></div>';
        if(blocked.length) {
          html += '<div class="stat-list">';
          blocked.forEach(p => {
            html += '<div style="padding:10px;background:var(--bg-hover);border-radius:8px;margin-bottom:6px"><div style="font-size:13px;font-weight:700">'+p.name+'</div>';
            if(p.blockers?.length) p.blockers.forEach(b => html += '<div style="font-size:11px;color:var(--red);margin-top:4px">• '+b+'</div>');
            html += '</div>';
          });
          html += '</div>';
        }
      } else if(type === 'tasks') {
        const total = data.reduce((a,p) => a + (p.done?.length||0) + (p.todo?.length||0), 0);
        const done = data.reduce((a,p) => a + (p.done?.length||0), 0);
        const todo = data.reduce((a,p) => a + (p.todo?.length||0), 0);
        html = '<div class="stat-detail"><div style="font-size:40px">📋</div><div class="stat-detail-n" style="color:var(--blue)">'+total+'</div><div class="stat-detail-l">Total Tasks</div></div>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px"><div style="text-align:center;padding:12px;background:var(--bg-hover);border-radius:10px"><div style="font-size:20px;font-weight:800;color:var(--secondary)">'+done+'</div><div style="font-size:10px;color:var(--text)">Done</div></div><div style="text-align:center;padding:12px;background:var(--bg-hover);border-radius:10px"><div style="font-size:20px;font-weight:800;color:var(--yellow)">'+todo+'</div><div style="font-size:10px;color:var(--text)">To Do</div></div></div>';
      }
      
      content.innerHTML = html;
    }
    function closeStats(){document.getElementById('statsPanel').classList.remove('show');playSound('close')}
  </script>
