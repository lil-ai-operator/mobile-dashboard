<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mission Control</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; margin: 0; }
    h1 { color: #00d68f; margin: 0 0 20px 0; }
    .project { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
    .project:hover { background: #2a2a2a; }
    .green { border-left: 4px solid #00d68f; }
    .red { border-left: 4px solid #ff4757; }
    .yellow { border-left: 4px solid #ffaa00; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .name { font-size: 18px; font-weight: bold; }
    .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .status.green { background: #00d68f; color: #000; }
    .status.red { background: #ff4757; color: #fff; }
    .status.yellow { background: #ffaa00; color: #000; }
    .summary { color: #888; margin: 10px 0; }
    .details { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #444; }
    .details.open { display: block; }
    .section-header { color: #00d68f; font-weight: bold; padding: 10px; background: #333; border-radius: 4px; cursor: pointer; margin: 10px 0; }
    .section-header:hover { background: #444; }
    .section-header.todo { color: #ffaa00; }
    .task-list { display: none; padding: 10px 0; }
    .task-list.open { display: block; }
    .task { padding: 8px; background: #333; margin: 5px 0; border-radius: 4px; display: flex; align-items: center; gap: 8px; }
    .task-check { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; }
    .task-check.done { background: #00d68f; }
    .task-check.todo { border: 2px solid #666; }
    .blocker { background: #3d1f1f; padding: 10px; border-radius: 4px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1><img src="01_PEPE4-export.gif" style="width:40px;vertical-align:middle;margin-right:10px;border-radius:8px;"> Mission Control</h1>
  <div id="projects">Loading...</div>
  <script>
    function toggleProject(id) {
      const el = document.getElementById('d-' + id);
      el.classList.toggle('open');
    }
    function toggleSection(el) {
      el.classList.toggle('open');
    }
    fetch('mission-control-data.json').then(r=>r.json()).then(data=>{
      let html = '';
      data.projects.forEach((p, i)=>{
        const pid = p.key || 'p' + i;
        html += '<div class="project '+p.status+'" onclick="toggleProject(\''+pid+'\')">';
        html += '<div class="header">';
        html += '<span class="name">'+p.name+'</span>';
        html += '<span class="status '+p.status+'">'+p.status+'</span></div>';
        if(p.summary) html += '<div class="summary">'+p.summary+'</div>';
        html += '<div id="d-'+pid+'" class="details">';
        if(p.blockers && p.blockers.length) {
          p.blockers.forEach(b=>{
            html += '<div class="blocker">🚫 '+b+'</div>';
          });
        }
        if(p.done && p.done.length) {
          html += '<div class="section-header" onclick="event.stopPropagation();toggleSection(this.nextElementSibling)">✅ Done ('+p.done.length+') ▼</div>';
          html += '<div class="task-list">';
          p.done.forEach(t=>{
            const taskName = typeof t === 'string' ? t : (t.task || '');
            html += '<div class="task"><span class="task-check done">✓</span> '+taskName+'</div>';
          });
          html += '</div>';
        }
        if(p.todo && p.todo.length) {
          html += '<div class="section-header todo" onclick="event.stopPropagation();toggleSection(this.nextElementSibling)">⬜ To Do ('+p.todo.length+') ▼</div>';
          html += '<div class="task-list">';
          p.todo.forEach(t=>{
            const taskName = typeof t === 'string' ? t : (t.task || '');
            html += '<div class="task"><span class="task-check todo"></span> '+taskName+'</div>';
          });
          html += '</div>';
        }
        html += '</div></div>';
      });
      document.getElementById('projects').innerHTML = html;
    }).catch(e=>{
      document.getElementById('projects').innerHTML = 'Error: '+e.message;
    });
  </script>
</body>
</html>
